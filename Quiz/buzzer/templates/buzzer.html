<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buzzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a18;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 360px;
      padding: 2rem;
      animation: fadeIn 0.3s ease;
    }

    #login-screen h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      color: #fff;
    }

    #login-screen p {
      font-size: 14px;
      color: #888780;
      text-align: center;
    }

    #name-input {
      width: 100%;
      font-size: 18px;
      font-weight: 700;
      padding: 14px 18px;
      border-radius: 14px;
      border: 2px solid #333;
      background: #2a2a28;
      color: #fff;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }

    #name-input:focus { border-color: #e63b2e; }
    #name-input::placeholder { color: #555; font-weight: 400; }


    #num-input {
      width: 100%;
      font-size: 18px;
      font-weight: 700;
      padding: 14px 18px;
      border-radius: 14px;
      border: 2px solid #333;
      background: #2a2a28;
      color: #fff;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }

    #num-input:focus { border-color: #e63b2e; }
    #num-input::placeholder { color: #555; font-weight: 400; }

    #join-btn {
      width: 100%;
      font-size: 16px;
      font-weight: 900;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #e63b2e;
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s, transform 0.1s;
    }

    #join-btn:hover  { background: #cc2e22; }
    #join-btn:active { transform: scale(0.98); }

    #error-msg {
      font-size: 13px;
      color: #e63b2e;
      min-height: 18px;
    }

    /* ── BUZZER SCREEN ── */
    #buzzer-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      height: 100vh;
      width: 100%;
      animation: fadeIn 0.3s ease;
    }

    #player-label {
      font-size: 14px;
      color: #888780;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #buzzer {
      width: 90vmin;
      height: 90vmin;
      border-radius: 50%;
      background: #e63b2e;
      border: none;
      cursor: pointer;
      box-shadow: 0 12px 0 #8a1a10, 0 16px 40px rgba(0,0,0,0.6);
      transition: transform 0.08s, box-shadow 0.08s;
      font-size: clamp(28px, 7vmin, 56px);
      font-weight: 900;
      letter-spacing: -1px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      user-select: none;
    }

    #buzzer:active:not(:disabled) {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #8a1a10, 0 8px 20px rgba(0,0,0,0.5);
    }

    #buzzer.pressed {
      background: #f5a623;
      box-shadow: 0 12px 0 #a06210, 0 16px 40px rgba(245,166,35,0.4);
      color: rgba(255,255,255,0.35);
      cursor: default;
    }

    #buzzer:disabled { cursor: default; }

    #info { text-align: center; min-height: 60px; display: flex; flex-direction: column; align-items: center; gap: 4px; }

    #winner-name {
      font-size: clamp(20px, 5vmin, 36px);
      font-weight: 800;
      color: #f5a623;
      display: none;
    }

    #winner-time {
      font-size: 13px;
      color: #888780;
      font-family: monospace;
      display: none;
    }

    #reset-btn {
      font-size: 13px;
      font-weight: 700;
      padding: 8px 24px;
      border-radius: 20px;
      border: 0.5px solid #444;
      background: transparent;
      color: #888780;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }

    #reset-btn:hover { background: #333; color: #fff; }
    #reset-btn.visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <h1>Buzzer</h1>
    <p>Enter your name to join the game</p>


    <form id = "data">
    <h3>Name : </h3>  <br>  <input id="name-input" type="text" name="name">
    <br>
    <br>
    <br>
    <h3>Number : </h3>  <br>  <input id="num-input" type="text" name="email">
    <br>

    </form>
    <div id="error-msg"></div>
    <button id="join-btn" onclick="joinGame()">Join Quiz</button>
  </div>

  <!-- BUZZER -->
  <div id="buzzer-screen">
    <div id="player-label"></div>
    <button id="buzzer" onclick="buzz()">BUZZ</button>
    <div id="info">
      <div id="winner-name"></div>
      <div id="winner-time"></div>
    </div>
    <button id="reset-btn" onclick="reset()">Reset</button>
  </div>

<script>


  let playerName = '';
  let buzzed = false;

  const nameInput   = document.getElementById('name-input');
  const numInput   = document.getElementById('num-input');
  const errorMsg    = document.getElementById('error-msg');
  const buzzer      = document.getElementById('buzzer');
  const winnerName  = document.getElementById('winner-name');
  const winnerTime  = document.getElementById('winner-time');
  const resetBtn    = document.getElementById('reset-btn');

  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });

  var formData;

  function getname(){
    var form = document.getElementById("data");
    // var submitter = document.querySelector("submit[value=Submit]");
    formData = new FormData(form);
    var recs = []
    for (const pair of formData.entries()) {
      recs.push(pair[1]);
    }
    recs.push(Date.now()/1000)

    // form.remove();

    // dom = document.getElementById('name')
    // dom.innerHTML = recs[0]

    send();
  }

  function send(){
    var name = formData.entries()
    // console.log(name);
    var recs = []
    for (const pair of formData.entries()) {
      recs.push(pair[1]);
    }
    recs.push(Date.now()/1000)
    // console.log(recs)

    var data = {"Name":recs[0] , "Mail":recs[1] , "Time":recs[2]}

    fetch("https://quiz-3epe.onrender.com/send/", { method: 'POST',
      headers: {"Content-Type": "application/json"},
        mode: 'no-cors',
        body: JSON.stringify(data)
    })
      .then(response => {
        // alert('Success!');
          console.log(recs[2]);
          // form.reset();
      })
      .catch(error => {
          alert('Error!');
      });

  }


  function joinGame() {
    const val = nameInput.value.trim();
    const num = nameInput.value.trim();
    if (!val && !num) { errorMsg.textContent = 'Please enter your name.'; return; }
    playerName = val;
    document.getElementById('login-screen').style.display = 'none';
    const bs = document.getElementById('buzzer-screen');
    bs.style.display = 'flex';
    // document.getElementById('player-label').textContent = 'Playing as ' + playerName;
    getname()
  }

  function buzz() {
    if (buzzed){
      reset();
      return;
    };
    buzzed = true;

    // const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' , millisecond : '3-digit'});

    buzzer.classList.add('pressed');
    // buzzer.disabled = true;
    buzzer.textContent = '!';

    winnerName.textContent = ' buzzed!';
    // winnerTime.textContent = 'at ' + time;
    winnerName.style.display = 'block';
    send();
    // winnerTime.style.display = 'block';
    // resetBtn.classList.add('visible');
  }

  function reset() {
    buzzed = false;
    buzzer.classList.remove('pressed');
    buzzer.disabled = false;
    buzzer.textContent = 'BUZZ';
    winnerName.style.display = 'none';
    // winnerTime.style.display = 'none';
    resetBtn.classList.remove('visible');
  }


</script>
</body>
</html>
